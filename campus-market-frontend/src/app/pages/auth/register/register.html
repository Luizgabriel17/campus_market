<div class="register-container">
  <div class="register-box">
    <div class="register-header">
      <h1>Campus Market</h1>
      <p>Crie sua conta</p>
    </div>

    <div *ngIf="success" class="success-message">
      ✓ Conta criada com sucesso! Redirecionando...
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="register-form" *ngIf="!success">
      <div class="form-group">
        <label for="name">Nome Completo</label>
        <input
          type="text"
          id="name"
          placeholder="Seu nome completo"
          [(ngModel)]="form.name"
          name="name"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="seu.email@example.com"
          [(ngModel)]="form.email"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            placeholder="Digite uma senha forte"
            [(ngModel)]="form.password"
            name="password"
            required
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility('password')"
          >
            {{ showPassword ? '👁️' : '👁️‍🗨️' }}
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Senha</label>
        <div class="password-input-wrapper">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            id="confirmPassword"
            placeholder="Confirme sua senha"
            [(ngModel)]="form.confirmPassword"
            name="confirmPassword"
            required
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility('confirmPassword')"
          >
            {{ showConfirmPassword ? '👁️' : '👁️‍🗨️' }}
          </button>
        </div>
      </div>

      <div *ngIf="error" class="error-message">{{ error }}</div>

      <button
        type="submit"
        class="btn-register"
        [disabled]="loading"
      >
        {{ loading ? 'Criando conta...' : 'Criar Conta' }}
      </button>
    </form>

    <div class="login-link">
      <p>Já possui conta?</p>
      <button type="button" (click)="goToLogin()" class="link-button">
        Entrar aqui
      </button>
    </div>
  </div>

  <div class="register-illustration">
    <div class="illustration-content">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <p>Junte-se à comunidade</p>
      <small>Comece a comprar e vender com segurança</small>
    </div>
  </div>
</div>
