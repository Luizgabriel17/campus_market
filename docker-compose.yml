services:
  postgres:
    image: postgres:16-alpine
    container_name: campus-market-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: campus_market
      POSTGRES_USER: campus_user
      POSTGRES_PASSWORD: campus_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
