<div class="auth-wrapper">
  <div class="auth-card">
    <header class="auth-header">
      <h1 class="brand-title">Campus Market</h1>
      <p class="brand-subtitle">Crie sua conta para acompanhar cardápios e realizar pedidos</p>
    </header>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="name" class="form-label">Nome Completo</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            id="name" 
            name="name" 
            [(ngModel)]="name" 
            required 
            placeholder="Ex: João Silva"
            class="form-input"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">E-mail Institucional</label>
        <div class="input-wrapper">
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="email" 
            required 
            placeholder="seu.nome@escolar.ifrn.edu.br"
            class="form-input"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Senha de Acesso</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="password" 
            required 
            placeholder="No mínimo 6 caracteres"
            class="form-input"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="role" class="form-label">Perfil de Acesso</label>
        <div class="input-wrapper">
          <select 
            id="role" 
            name="role" 
            [(ngModel)]="role" 
            required
            class="form-select"
          >
            <option value="" disabled selected>Selecione o que deseja fazer</option>
            <option value="CLIENTE">Quero Comprar (Visualizar cardápios e lanches)</option>
            <option value="VENDEDOR">Quero Vender (Gerenciar produtos e pedidos)</option>
          </select>
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-banner">
        <span class="error-text">{{ errorMessage }}</span>
      </div>

      <button type="submit" class="btn-submit">Cadastrar e Entrar</button>
    </form>

    <footer class="auth-footer">
      <span class="footer-notice">Já tem uma conta?</span>
      <a routerLink="/login" class="footer-link">Faça login aqui</a>
    </footer>
  </div>
</div>
