<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1 class="logo-title">CampusMarket</h1>
      <p class="subtitle">Entre na sua conta</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form">
      <!-- Mensagens de Erro -->
      <div class="alert alert-error" *ngIf="errorMessage">
        <span class="icon">⚠️</span>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Mensagens de Sucesso -->
      <div class="alert alert-success" *ngIf="successMessage">
        <span class="icon">✓</span>
        <span>{{ successMessage }}</span>
      </div>

      <!-- Campo Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="seu.email@example.com"
          class="form-input"
          [class.input-error]="emailControl?.invalid && (emailControl?.dirty || emailControl?.touched)"
        />
        <div class="field-error" *ngIf="emailControl?.invalid && (emailControl?.dirty || emailControl?.touched)">
          <span *ngIf="emailControl?.errors?.['required']">Email é obrigatório</span>
          <span *ngIf="emailControl?.errors?.['email']">Email inválido</span>
        </div>
      </div>

      <!-- Campo Senha -->
      <div class="form-group">
        <div class="password-label">
          <label for="senha">Senha</label>
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility()"
            tabindex="-1"
          >
            {{ showPassword ? '👁️ Ocultar' : '👁️ Mostrar' }}
          </button>
        </div>
        <input
          id="senha"
          [type]="showPassword ? 'text' : 'password'"
          formControlName="senha"
          placeholder="Mínimo 6 caracteres"
          class="form-input"
          [class.input-error]="senhaControl?.invalid && (senhaControl?.dirty || senhaControl?.touched)"
        />
        <div class="field-error" *ngIf="senhaControl?.invalid && (senhaControl?.dirty || senhaControl?.touched)">
          <span *ngIf="senhaControl?.errors?.['required']">Senha é obrigatória</span>
          <span *ngIf="senhaControl?.errors?.['minlength']">Mínimo 6 caracteres</span>
        </div>
      </div>

      <!-- Botão Login -->
      <button
        type="submit"
        class="login-btn"
        [disabled]="loading || loginForm.invalid"
      >
        <span *ngIf="!loading">Entrar</span>
        <span *ngIf="loading" class="loading-spinner"></span>
      </button>
    </form>

    <!-- Divisor -->
    <div class="divider">
      <span>ou</span>
    </div>

    <!-- Botão Google -->
    <button
      type="button"
      class="google-btn"
      (click)="loginGoogle()"
      [disabled]="googleLoading"
    >
      <span class="google-icon">G</span>
      <span *ngIf="!googleLoading">Entrar com Google</span>
      <span *ngIf="googleLoading" class="loading-spinner"></span>
    </button>

    <!-- Link para Registro -->
    <div class="register-link">
      <p>Não tem uma conta? <a routerLink="/register">Crie uma agora</a></p>
    </div>
  </div>
</div>
