services:
  postgres:
    image: postgres:16-alpine

    container_name: campus-market-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: campus_market
      POSTGRES_USER: campus_user
      POSTGRES_PASSWORD: campus_pass

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: campus-market-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: